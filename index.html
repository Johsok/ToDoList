<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f2027">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="週待辦清單">
  <title>週待辦清單</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(255, 255, 255, 0.13);
      --surface-soft: rgba(255, 255, 255, 0.04);
      --grid: rgba(255, 255, 255, 0.17);
      --grid-soft: rgba(255, 255, 255, 0.09);
      --text: #f7fbff;
      --muted: #aebfca;
      --accent: #4facfe;
      --accent-strong: #2f9dff;
      --today: rgba(79, 172, 254, 0.12);
      --now: rgba(80, 227, 194, 0.28);
      --now-line: #50e3c2;
      --important: #ff6b6b;
      --important-bg: rgba(255, 107, 107, 0.15);
      --done: 0.55;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
      --radius: 8px;
      --time-col: 72px;
      --day-col-min: 104px;
      --day-col-max: 360px;
      --day-col-0: var(--day-col-min);
      --day-col-1: var(--day-col-min);
      --day-col-2: var(--day-col-min);
      --day-col-3: var(--day-col-min);
      --day-col-4: var(--day-col-min);
      --day-col-5: var(--day-col-min);
      --day-col-6: var(--day-col-min);
      --slot-height: 48px;
      --todo-font-size: 15px;
      --focus: 0 0 0 3px rgba(79, 172, 254, 0.28);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-theme="midnight"] {
      --bg: linear-gradient(135deg, #08111f, #10233f, #0f3650);
      --surface: rgba(140, 178, 220, 0.08);
      --surface-strong: rgba(140, 178, 220, 0.14);
      --surface-soft: rgba(140, 178, 220, 0.04);
      --grid: rgba(173, 198, 230, 0.18);
      --grid-soft: rgba(173, 198, 230, 0.09);
      --text: #eef6ff;
      --muted: #9db2cc;
      --accent: #80aaff;
      --accent-strong: #aac4ff;
      --today: rgba(128, 170, 255, 0.14);
    }

    body[data-theme="forest"] {
      --bg: linear-gradient(135deg, #082317, #123928, #1c5a48);
      --surface: rgba(221, 255, 239, 0.08);
      --surface-strong: rgba(221, 255, 239, 0.14);
      --surface-soft: rgba(221, 255, 239, 0.04);
      --grid: rgba(208, 255, 232, 0.18);
      --grid-soft: rgba(208, 255, 232, 0.09);
      --text: #f2fff8;
      --muted: #b4d1c3;
      --accent: #61d394;
      --accent-strong: #8ef0b5;
      --today: rgba(97, 211, 148, 0.15);
    }

    body[data-theme="sunrise"] {
      color-scheme: light;
      --bg: linear-gradient(135deg, #fff3d6, #ffe0c2, #f7b98c);
      --surface: rgba(255, 255, 255, 0.66);
      --surface-strong: rgba(255, 255, 255, 0.9);
      --surface-soft: rgba(255, 255, 255, 0.46);
      --grid: rgba(110, 78, 64, 0.25);
      --grid-soft: rgba(110, 78, 64, 0.13);
      --text: #2e211b;
      --muted: #745e52;
      --accent: #d06435;
      --accent-strong: #a94721;
      --today: rgba(208, 100, 53, 0.12);
      --shadow: 0 18px 50px rgba(124, 66, 34, 0.18);
    }

    body[data-theme="minimal"] {
      color-scheme: light;
      --bg: linear-gradient(135deg, #f8fafc, #edf2f7, #e2e8f0);
      --surface: rgba(255, 255, 255, 0.75);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --surface-soft: rgba(255, 255, 255, 0.55);
      --grid: rgba(30, 41, 59, 0.18);
      --grid-soft: rgba(30, 41, 59, 0.1);
      --text: #111827;
      --muted: #5b6472;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --today: rgba(37, 99, 235, 0.09);
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
    }

    body[data-theme="classic_blue"] {
      color-scheme: light;
      --bg: linear-gradient(135deg, #e7f0ff, #f7fbff, #dbeafe);
      --surface: rgba(255, 255, 255, 0.76);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --surface-soft: rgba(255, 255, 255, 0.56);
      --grid: rgba(22, 78, 155, 0.22);
      --grid-soft: rgba(22, 78, 155, 0.12);
      --text: #10243e;
      --muted: #506882;
      --accent: #1d6fd6;
      --accent-strong: #0f55b1;
      --today: rgba(29, 111, 214, 0.11);
      --shadow: 0 18px 50px rgba(28, 72, 124, 0.14);
    }

    body[data-theme="nord"] {
      --bg: linear-gradient(135deg, #2e3440, #3b4252, #4c566a);
      --surface: rgba(216, 222, 233, 0.08);
      --surface-strong: rgba(216, 222, 233, 0.14);
      --surface-soft: rgba(216, 222, 233, 0.04);
      --grid: rgba(216, 222, 233, 0.18);
      --grid-soft: rgba(216, 222, 233, 0.09);
      --text: #eceff4;
      --muted: #b9c2d1;
      --accent: #88c0d0;
      --accent-strong: #8fbcbb;
      --today: rgba(136, 192, 208, 0.14);
    }

    body[data-theme="dracula"] {
      --bg: linear-gradient(135deg, #1f1d2e, #282a36, #3b2a52);
      --surface: rgba(248, 248, 242, 0.08);
      --surface-strong: rgba(248, 248, 242, 0.14);
      --surface-soft: rgba(248, 248, 242, 0.04);
      --grid: rgba(248, 248, 242, 0.18);
      --grid-soft: rgba(248, 248, 242, 0.09);
      --text: #f8f8f2;
      --muted: #c7bddb;
      --accent: #bd93f9;
      --accent-strong: #8be9fd;
      --today: rgba(189, 147, 249, 0.14);
      --important: #ff79c6;
      --important-bg: rgba(255, 121, 198, 0.16);
    }

    body[data-theme="solarized"] {
      color-scheme: light;
      --bg: linear-gradient(135deg, #fdf6e3, #eee8d5, #d8d2b8);
      --surface: rgba(253, 246, 227, 0.74);
      --surface-strong: rgba(253, 246, 227, 0.94);
      --surface-soft: rgba(253, 246, 227, 0.54);
      --grid: rgba(101, 123, 131, 0.23);
      --grid-soft: rgba(101, 123, 131, 0.12);
      --text: #073642;
      --muted: #657b83;
      --accent: #268bd2;
      --accent-strong: #2aa198;
      --today: rgba(38, 139, 210, 0.11);
      --shadow: 0 18px 50px rgba(88, 72, 35, 0.14);
    }

    body[data-theme="high_contrast"] {
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.1);
      --surface-strong: rgba(255, 255, 255, 0.18);
      --surface-soft: rgba(255, 255, 255, 0.05);
      --grid: rgba(255, 255, 255, 0.38);
      --grid-soft: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: #d8d8d8;
      --accent: #00e5ff;
      --accent-strong: #fff200;
      --today: rgba(0, 229, 255, 0.16);
      --now: rgba(0, 255, 194, 0.24);
      --now-line: #00ffc2;
      --important: #ff3b30;
      --important-bg: rgba(255, 59, 48, 0.23);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--text);
      background: var(--bg);
      letter-spacing: 0;
      transition: background 180ms ease, color 180ms ease;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    button,
    .date-input,
    .select-control,
    .time-control {
      min-height: 44px;
      border: 1px solid var(--grid);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    [contenteditable="true"]:focus-visible {
      box-shadow: var(--focus);
    }

    .app-shell {
      width: min(1600px, 100%);
      min-height: 100svh;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
      gap: 16px;
      align-items: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border: 2px solid var(--text);
      border-radius: 7px;
      position: relative;
      flex: 0 0 auto;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 8px;
      border: 2px solid var(--text);
      border-bottom: 0;
      border-radius: 6px 6px 0 0;
      left: 11px;
      top: -8px;
      background: transparent;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 10px;
      border-left: 3px solid var(--text);
      border-bottom: 3px solid var(--text);
      transform: rotate(-45deg);
      left: 10px;
      top: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .jump-controls,
    .top-actions,
    .week-nav,
    .day-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .jump-controls {
      justify-content: center;
      flex-wrap: wrap;
    }

    .top-actions {
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .mobile-quick-nav {
      display: none;
    }

    .icon-button,
    .text-button {
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .icon-button {
      width: 48px;
      padding: 0;
      font-size: 28px;
      line-height: 1;
    }

    .text-button:hover,
    .icon-button:hover {
      border-color: var(--accent);
      background: var(--surface-strong);
    }

    .text-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .date-input,
    .select-control,
    .time-control {
      padding: 0 12px;
      accent-color: var(--accent);
    }

    select,
    select option {
      color: var(--text);
      background: #111827;
    }

    .date-input {
      min-width: 162px;
    }

    .sync-status {
      min-width: 118px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--grid);
      border-radius: var(--radius);
      min-height: 44px;
      font-size: 14px;
    }

    .sync-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #28d17c;
      box-shadow: 0 0 14px rgba(40, 209, 124, 0.68);
    }

    .sync-status[data-state="saving"] .sync-dot {
      background: #ffb74d;
      box-shadow: 0 0 14px rgba(255, 183, 77, 0.68);
      animation: pulse 900ms infinite alternate;
    }

    .sync-status[data-state="error"] .sync-dot {
      background: var(--important);
      box-shadow: 0 0 14px rgba(255, 107, 107, 0.68);
    }

    @keyframes pulse {
      from {
        opacity: 0.45;
      }
      to {
        opacity: 1;
      }
    }

    .main-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 314px;
      gap: 20px;
      align-items: start;
    }

    .calendar-area {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-width: 0;
    }

    .range-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .week-title {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .week-title span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .view-toggle {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--grid);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .view-mode-button {
      width: 36px;
      min-height: 32px;
      padding: 0;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .view-mode-button.is-active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent), transparent 70%);
      color: var(--text);
    }

    .calendar-icon {
      width: 27px;
      height: 27px;
      border: 2px solid currentColor;
      border-radius: 5px;
      position: relative;
      flex: 0 0 auto;
    }

    .calendar-icon::before,
    .calendar-icon::after {
      content: "";
      position: absolute;
      top: -6px;
      width: 3px;
      height: 9px;
      background: currentColor;
      border-radius: 2px;
    }

    .calendar-icon::before {
      left: 6px;
    }

    .calendar-icon::after {
      right: 6px;
    }

    .calendar-frame {
      overflow: auto;
      border: 1px solid var(--grid);
      border-radius: var(--radius);
      background: var(--surface-soft);
      box-shadow: var(--shadow);
      max-height: calc(100svh - 174px);
      min-height: 480px;
      scrollbar-color: var(--accent) transparent;
    }

    .schedule-grid {
      display: grid;
      width: max-content;
      min-width: 100%;
      grid-template-columns:
        var(--time-col)
        minmax(var(--day-col-min), var(--day-col-0))
        minmax(var(--day-col-min), var(--day-col-1))
        minmax(var(--day-col-min), var(--day-col-2))
        minmax(var(--day-col-min), var(--day-col-3))
        minmax(var(--day-col-min), var(--day-col-4))
        minmax(var(--day-col-min), var(--day-col-5))
        minmax(var(--day-col-min), var(--day-col-6));
      align-items: stretch;
    }

    .schedule-grid.is-today-view {
      width: 100%;
      grid-template-columns: var(--time-col) minmax(0, 1fr);
    }

    .grid-cell {
      min-width: 0;
      border-right: 1px solid var(--grid);
      border-bottom: 1px solid var(--grid-soft);
    }

    .grid-cell:nth-child(8n) {
      border-right: 0;
    }

    .schedule-grid.is-today-view .grid-cell:nth-child(2n) {
      border-right: 0;
    }

    .time-head,
    .day-head {
      position: sticky;
      top: 0;
      z-index: 4;
      min-height: 54px;
      background: color-mix(in srgb, var(--surface-strong), transparent 8%);
      backdrop-filter: blur(20px);
    }

    .time-head {
      left: 0;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-weight: 700;
    }

    .day-head {
      padding: 8px 10px;
      display: grid;
      place-items: center;
      gap: 2px;
      cursor: pointer;
      user-select: none;
      transition: background 120ms ease, color 120ms ease;
    }

    .day-head:hover {
      background: var(--surface-strong);
    }

    .day-head.is-today {
      background: var(--today);
      color: var(--accent);
      border-top: 2px solid var(--accent);
    }

    .day-date {
      font-size: 17px;
      font-weight: 700;
    }

    .day-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .time-cell {
      position: sticky;
      left: 0;
      z-index: 3;
      min-height: var(--slot-height);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--surface-strong), transparent 15%);
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-size: 15px;
    }

    .time-cell.is-current {
      color: var(--now-line);
      background: color-mix(in srgb, var(--now), var(--surface-strong) 60%);
      border-top: 1px solid var(--now-line);
      border-bottom: 1px solid var(--now-line);
    }

    .time-cell.is-current::before {
      content: none;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--now-line);
      margin-top: 4px;
      margin-right: 8px;
    }

    .slot-cell {
      min-height: var(--slot-height);
      padding: 5px 7px;
      background: rgba(255, 255, 255, 0.03);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 5px;
      transition: background 120ms ease, outline-color 120ms ease;
    }

    .slot-cell.is-open {
      z-index: 8;
    }

    .slot-cell.has-todos {
      align-items: center;
    }

    .schedule-grid.is-today-view .slot-cell {
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .schedule-grid.is-today-view .todo-item {
      flex: 0 0 auto;
    }

    .slot-cell.is-today {
      background: var(--today);
    }

    .slot-cell.is-current {
      z-index: 2;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--now-line), transparent 62%), var(--now)),
        var(--now);
      color: #fff8e1;
      outline: 2px solid var(--now-line);
      outline-offset: -2px;
      box-shadow: inset 0 0 0 1px rgba(225, 255, 249, 0.3), 0 0 22px rgba(80, 227, 194, 0.28);
    }

    .slot-cell.is-drop-target {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: color-mix(in srgb, var(--accent), transparent 84%);
    }

    .todo-item {
      width: fit-content;
      max-width: 100%;
      min-height: 36px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--grid);
      border-left: 3px solid var(--accent);
      border-radius: 7px;
      padding: 5px 7px;
      color: var(--text);
      background: var(--surface);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      cursor: grab;
      white-space: nowrap;
      font-size: var(--todo-font-size);
    }

    .todo-item:active {
      cursor: grabbing;
    }

    .todo-item.is-important {
      border-color: color-mix(in srgb, var(--important), var(--grid) 35%);
      border-left-color: var(--important);
      background: var(--important-bg);
    }

    .todo-item.is-done {
      opacity: var(--done);
    }

    .todo-item.is-done .todo-text {
      text-decoration: line-through;
    }

    .todo-item.is-drag-over {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .drag-handle {
      color: var(--muted);
      text-align: center;
      cursor: grab;
      line-height: 1;
      user-select: none;
    }

    .todo-check {
      width: 24px;
      height: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 6px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
    }

    .todo-check[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .todo-text {
      flex: 1 1 auto;
      min-width: 0;
      padding: 3px 2px;
      border-radius: 5px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .todo-text:focus {
      overflow: visible;
      text-overflow: clip;
    }

    .todo-text:empty::before {
      content: "未命名";
      color: var(--muted);
    }

    .mini-button {
      width: 28px;
      min-height: 28px;
      padding: 0;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
    }

    .mini-button:hover {
      color: var(--text);
      border-color: var(--accent);
      background: var(--surface);
    }

    .todo-actions {
      position: absolute;
      left: 4px;
      right: 4px;
      top: 4px;
      z-index: 12;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--grid);
      border-radius: 7px;
      background: color-mix(in srgb, var(--surface-strong), #000 20%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .slot-cell.is-open .todo-actions {
      display: flex;
    }

    .todo-action-select {
      flex: 1 1 auto;
      min-width: 76px;
      max-width: 132px;
      min-height: 30px;
      padding: 0 6px;

      els.calendarFrame.addEventListener("input", handleCalendarInput);
      els.calendarFrame.addEventListener("change", handleCalendarChange);
      els.calendarFrame.addEventListener("keydown", handleCalendarKeydown);
      els.calendarFrame.addEventListener("dragstart", handleDragStart);
      els.calendarFrame.addEventListener("dragover", handleDragOver);
      els.calendarFrame.addEventListener("dragleave", handleDragLeave);
      els.calendarFrame.addEventListener("drop", handleDrop);
      els.calendarFrame.addEventListener("dragend", clearDragStyles);

      els.themeSelect.addEventListener("change", () => changeTheme(els.themeSelect.value));
      els.addCommonItemBtn.addEventListener("click", addCommonItem);
      els.commonItemInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") addCommonItem();
      });
      els.commonItemsList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-common-delete]");
        if (button) removeCommonItem(button.dataset.commonDelete);
      });

      els.scrim.addEventListener("click", closeDayMenu);
      els.closeDayMenuBtn.addEventListener("click", closeDayMenu);
      els.clearDayBtn.addEventListener("click", clearSelectedDay);
      els.openCopyDayBtn.addEventListener("click", () => {
        els.copyTargetBox.classList.toggle("is-open");
        els.copyTargetInput.value = addDaysKey(state.selectedDay, 1);
        els.copyTargetInput.focus();
      });
      els.confirmCopyBtn.addEventListener("click", copySelectedDay);
      window.addEventListener("resize", renderWeekTitle);
    }

    async function createSupabaseClient() {
      const configured = /^https:\/\/.+\.supabase\.co$/i.test(SUPABASE_URL.trim()) && SUPABASE_ANON_KEY.trim().length > 40;
      if (!configured) {
        setSyncStatus("error", "雲端未設定");
        showToast("Supabase 設定不完整，無法同步雲端。");
        return null;
      }

      try {
        await loadScriptWithFallback([
          "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2",
          "https://unpkg.com/@supabase/supabase-js@2"
        ]);
        if (!window.supabase) throw new Error("Supabase SDK not found");
        return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: false,
            autoRefreshToken: false,
            detectSessionInUrl: false
          }
        });
      } catch (error) {
        showToast("Supabase SDK 載入失敗，無法同步雲端。");
        console.warn(error);
        return null;
      }
    }

    function loadScriptWithFallback(urls, index = 0) {
      return new Promise((resolve, reject) => {
        if (window.supabase) {
          resolve();
          return;
        }
        if (index >= urls.length) {
          reject(new Error("All SDK sources failed"));
          return;
        }
        const script = document.createElement("script");
        script.src = urls[index];
        script.async = true;
        script.onload = () => resolve();
        script.onerror = () => {
          script.remove();
          loadScriptWithFallback(urls, index + 1).then(resolve).catch(reject);
        };
        document.head.appendChild(script);
      });
    }

    async function loadSettings() {
      let settings = { ...DEFAULT_SETTINGS };

      if (state.supabase) {
        try {
          const data = await readSettingsRow(true);
          settings = normalizeSettings(data || DEFAULT_SETTINGS);
        } catch (error) {
          if (isMissingViewModeColumnError(error)) {
            try {
              const data = await readSettingsRow(false);
              settings = normalizeSettings(data || DEFAULT_SETTINGS);
            } catch (legacyError) {
              reportSupabaseError(legacyError, "讀取雲端設定失敗");
            }
          } else {
            reportSupabaseError(error, "讀取雲端設定失敗");
          }
        }
      }

      state.settings = settings;
      fillSettingsForm();
      applyTheme(settings.theme_id);
    }

    async function readSettingsRow(includeViewMode) {
      const { data, error } = await state.supabase
        .from("app_settings")
        .select(includeViewMode ? SETTINGS_SELECT_FIELDS : LEGACY_SETTINGS_SELECT_FIELDS)
        .eq("id", APP_SETTINGS_ID)
        .maybeSingle();
      if (error) throw error;
      return data;
    }

    async function loadTodosForCurrentRange() {
      const start = addDaysKey(state.weekStart, -14);
      const end = addDaysKey(state.weekStart, 27);
      state.loadedRange = { start, end };

      if (!requireCloudClient()) {
        state.todos = [];
        return;
      }

      try {
        const { data, error } = await state.supabase
          .from("todos")
          .select("*")
          .eq("instance_id", state.instanceId)
          .gte("todo_date", start)
          .lte("todo_date", end)
          .order("todo_date", { ascending: true })
          .order("slot_start", { ascending: true })
          .order("sort_order", { ascending: true });
        if (error) throw error;
        state.todos = (data || []).map(normalizeTodo);
      } catch (error) {
        state.todos = [];
        setSyncStatus("error", "讀取雲端失敗");
        showToast("讀取雲端資料失敗，請確認 Supabase 連線。");
        console.warn(error);
      }
    }

    function renderAll() {
      applyTheme(state.settings.theme_id);
      applyFontSize(state.settings.font_size);
      renderThemes();
      fillSettingsForm();
      renderCommonItems();
      renderViewModeControls();
      renderWeekTitle();
      renderCalendar();
    }

    function renderWeekTitle() {
      if (state.settings.view_mode === "today") {
        const today = todayKey();
        els.weekTitle.textContent = isMobileLayout()
          ? `${formatFullDate(today)} (${weekdayName(today)})`
          : `${formatFullDate(today)}（${weekdayName(today)}）`;
        return;
      }

      const end = addDaysKey(state.weekStart, 6);
      els.weekTitle.textContent = isMobileLayout()
        ? `${formatFullDate(state.weekStart)} (${weekdayName(state.weekStart)}) ~ ${formatMonthDay(end)} (${weekdayName(end)})`
        : `${formatFullDate(state.weekStart)}（${weekdayName(state.weekStart)}） - ${formatMonthDay(end)}（${weekdayName(end)}）`;
    }

    function renderCalendar() {
      const days = getVisibleDays();
      const slots = generateSlots();
      if (!slots.length) {
        els.calendarFrame.innerHTML = '<div class="empty-state">時段設定無效，請調整每日時段。</div>';
        return;
      }

      const today = todayKey();
      const currentSlot = getCurrentSlotKey();
      const grid = document.createElement("div");
      grid.className = `schedule-grid is-${state.settings.view_mode}-view`;
      grid.setAttribute("role", "grid");
      applyDayColumnWidths(grid, days);

      const timeHead = document.createElement("div");
      timeHead.className = "grid-cell time-head";
      timeHead.textContent = "時間";
      grid.appendChild(timeHead);

      days.forEach((day) => {
        const dayHead = document.createElement("button");
        dayHead.type = "button";
        dayHead.className = `grid-cell day-head${day === today ? " is-today" : ""}`;
        dayHead.dataset.date = day;
        dayHead.innerHTML = `
          <span class="day-date">${formatColumnDate(day)}</span>
        `;
        grid.appendChild(dayHead);
      });

      slots.forEach((slot) => {
        const isCurrentRow = slot === currentSlot && days.includes(today);
        const timeCell = document.createElement("div");
        timeCell.className = `grid-cell time-cell${isCurrentRow ? " is-current" : ""}`;
        timeCell.textContent = slot;
        grid.appendChild(timeCell);

        days.forEach((day) => {
          const cellTodos = getTodosForCell(day, slot);
          const slotCell = document.createElement("div");
          const isCurrent = day === today && slot === currentSlot;
          slotCell.className = [
            "grid-cell",
            "slot-cell",
            day === today ? "is-today" : "",
            isCurrent ? "is-current" : "",
            cellTodos.length ? "has-todos" : ""
          ].filter(Boolean).join(" ");
          slotCell.dataset.date = day;
          slotCell.dataset.time = slot;
          slotCell.setAttribute("role", "gridcell");
          slotCell.innerHTML = (cellTodos.length ? renderCellActions(cellTodos[0]) : "") + cellTodos.map(renderTodo).join("");
          grid.appendChild(slotCell);
        });
      });

      els.calendarFrame.replaceChildren(grid);
    }

    function applyDayColumnWidths(grid, days) {
      days.forEach((day, index) => {
        grid.style.setProperty(`--day-col-${index}`, `${getDayColumnWidth(day)}px`);
      });
    }

    function getDayColumnWidth(day) {
      const headerWidth = measureUiText(formatColumnDate(day)) + 28;
      const todoWidth = getTodosForDay(day).reduce((width, todo) => {
        return Math.max(width, measureUiText(todo.content || "未命名") + DAY_COLUMN_TODO_CHROME_WIDTH);
      }, 0);
      return Math.round(Math.min(DAY_COLUMN_MAX_WIDTH, Math.max(DAY_COLUMN_MIN_WIDTH, headerWidth, todoWidth)));
    }

    function measureUiText(text) {
      if (!textMeasureContext) {
        textMeasureContext = document.createElement("canvas").getContext("2d");
      }
      const fontSize = getComputedStyle(document.documentElement).getPropertyValue("--todo-font-size").trim() || "15px";
      const fontFamily = getComputedStyle(document.body).fontFamily || "sans-serif";
      textMeasureContext.font = `${fontSize} ${fontFamily}`;
      return textMeasureContext.measureText(String(text || "")).width;
    }

    function renderTodo(todo) {
      const classes = [
        "todo-item",
        todo.is_done ? "is-done" : "",
        todo.color_tag === "important" ? "is-important" : ""
      ].filter(Boolean).join(" ");
      return `
        <article class="${classes}" draggable="true" data-todo-id="${escapeAttr(todo.id)}">
          <span class="drag-handle" title="拖曳">⋮⋮</span>
          <span class="todo-text" contenteditable="true" spellcheck="false">${escapeHtml(todo.content)}</span>
        </article>
      `;
    }

    function renderCellActions(todo) {
      return `
        <div class="todo-actions" data-active-todo-id="${escapeAttr(todo.id)}">
          <select class="todo-action-select" data-action="common" aria-label="常用項目">
            <option value="">常用</option>
            ${renderCommonOptions()}
          </select>
          <button class="mini-button todo-action-button" type="button" data-action="add-near">新增</button>
          <button class="mini-button todo-action-button" type="button" data-action="delete">刪除</button>
          <button class="mini-button todo-action-button" type="button" data-action="toggle">${todo.is_done ? "未完成" : "已完成"}</button>
        </div>
      `;
    }

    function renderThemes() {
      els.themeSelect.innerHTML = THEMES.map((theme) => `
        <option value="${theme.id}"${theme.id === state.settings.theme_id ? " selected" : ""}>${theme.name}</option>
      `).join("");
    }

    function renderCommonOptions() {
      return getCommonItems().map((item) => `<option value="${escapeAttr(item)}">${escapeHtml(item)}</option>`).join("");
    }

    function renderCommonItems() {
      const items = getCommonItems();
      els.commonItemsList.innerHTML = items.length
        ? items.map((item) => `
          <div class="common-item">
            <span>${escapeHtml(item)}</span>
            <button class="mini-button" type="button" data-common-delete="${escapeAttr(item)}">×</button>
          </div>
        `).join("")
        : '<p class="hint">尚未設定常用項目。</p>';
    }

    function renderViewModeControls() {
      const isTodayMode = state.settings.view_mode === "today";
      els.todayViewBtn.classList.toggle("is-active", isTodayMode);
      els.weekViewBtn.classList.toggle("is-active", !isTodayMode);
      els.todayViewBtn.setAttribute("aria-pressed", String(isTodayMode));
      els.weekViewBtn.setAttribute("aria-pressed", String(!isTodayMode));
    }

    function fillSettingsForm() {
      els.dayStartInput.value = trimTime(state.settings.day_start);
      els.dayEndInput.value = trimTime(state.settings.day_end);
      els.intervalSelect.value = String(state.settings.interval_minutes);
      els.themeSelect.value = state.settings.theme_id;
      els.fontSizeSelect.value = state.settings.font_size;
    }

    async function shiftWeek(days) {
      state.weekStart = addDaysKey(state.weekStart, days);
      setJumpDateInputs(state.weekStart);
      await loadTodosForCurrentRange();
      renderAll();
      scheduleCurrentSlotUpdate();
    }

    async function goToDate(dateKeyValue) {
      if (!dateKeyValue) return;
      state.weekStart = getMonday(dateKeyValue);
      setJumpDateInputs(dateKeyValue);
      await loadTodosForCurrentRange();
      renderAll();
      scheduleCurrentSlotUpdate();
      requestAnimationFrame(() => {
        const head = els.calendarFrame.querySelector(`.day-head[data-date="${dateKeyValue}"]`);
        if (head) head.scrollIntoView({ inline: "center", block: "nearest" });
      });
    }

    async function changeViewMode(viewMode) {
      if (!isValidViewMode(viewMode) || state.settings.view_mode === viewMode) return;
      state.settings.view_mode = viewMode;
      if (viewMode === "today") {
        const today = todayKey();
        state.weekStart = getMonday(today);
        setJumpDateInputs(today);
        await loadTodosForCurrentRange();
      }
      renderAll();
      await persistSettings();
      scheduleCurrentSlotUpdate();
    }

    function toggleSettings() {
      const isHidden = els.settingsPanel.hasAttribute("hidden");
      if (isHidden) {
        els.settingsPanel.removeAttribute("hidden");
        els.settingsBtn.setAttribute("aria-expanded", "true");
      } else {
        els.settingsPanel.setAttribute("hidden", "");
        els.settingsBtn.setAttribute("aria-expanded", "false");
      }
    }

    async function saveSettingsFromForm() {
      const nextSettings = normalizeSettings({
        day_start: els.dayStartInput.value,
        day_end: els.dayEndInput.value,
        interval_minutes: Number(els.intervalSelect.value),
        theme_id: state.settings.theme_id,
        font_size: els.fontSizeSelect.value,
        view_mode: state.settings.view_mode,
        common_items: getCommonItems()
      });

      if (timeToMinutes(nextSettings.day_start) >= timeToMinutes(nextSettings.day_end)) {
        showToast("起始時間必須早於結束時間。");
        return;
      }

      state.settings = nextSettings;
      applyFontSize(state.settings.font_size);
      renderAll();
      await persistSettings();
      showToast("設定已更新。");
    }

    async function changeTheme(themeId) {
      if (!isValidTheme(themeId)) return;
      state.settings.theme_id = themeId;
      applyTheme(themeId);
      renderThemes();
      await persistSettings();
    }

    async function addCommonItem() {
      const item = els.commonItemInput.value.trim();
      if (!item) return;
      const items = getCommonItems();
      if (!items.includes(item)) {
        state.settings.common_items = [...items, item];
      }
      els.commonItemInput.value = "";
      renderCommonItems();
      renderCalendar();
      await persistSettings();
    }

    async function removeCommonItem(item) {
      state.settings.common_items = getCommonItems().filter((value) => value !== item);
      renderCommonItems();
      renderCalendar();
      await persistSettings();
    }

    /**
     * Updates and verifies the singleton settings row without inserting a new app_settings row.
     */
    async function persistSettings() {
      if (!requireCloudClient()) {
        return;
      }

      setSyncStatus("saving", "雲端儲存中…");
      const payload = toSettingsPayload(true);
      try {
        await writeAndVerifySettings(payload, true);
        state.settings = normalizeSettings(payload);
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        if (isMissingViewModeColumnError(error)) {
          await persistLegacySettings();
          return;
        }
        if (!isPermanentSupabaseError(error)) {
          queueRetry(() => persistSettings());
        }
        reportSupabaseError(error, "設定同步失敗");
      }
    }

    async function persistLegacySettings() {
      const payload = toSettingsPayload(false);
      try {
        const currentViewMode = state.settings.view_mode;
        const savedSettings = await writeAndVerifySettings(payload, false);
        state.settings = normalizeSettings({ ...savedSettings, view_mode: currentViewMode });
        setSyncStatus("saved", "同步雲端");
        showToast("Supabase 尚未建立 view_mode 欄位，顯示模式暫時不會被記憶。");
      } catch (error) {
        if (!isPermanentSupabaseError(error)) {
          queueRetry(() => persistSettings());
        }
        reportSupabaseError(error, "設定同步失敗");
      }
    }

    async function writeAndVerifySettings(payload, includeViewMode) {
      const { error } = await state.supabase
        .from("app_settings")
        .update(payload)
        .eq("id", APP_SETTINGS_ID);
      if (error) throw error;

      const savedSettings = await readSettingsRow(includeViewMode);
      if (!savedSettings) throw new Error(`app_settings id=${APP_SETTINGS_ID} 不存在，請先建立固定設定列。`);
      if (!settingsPayloadMatches(savedSettings, payload, includeViewMode)) {
        throw new Error("設定未寫入 Supabase，請檢查 app_settings 的 anon UPDATE policy。");
      }
      return savedSettings;
    }

    function toSettingsPayload(includeViewMode) {
      const payload = {
        day_start: trimTime(state.settings.day_start),
        day_end: trimTime(state.settings.day_end),
        interval_minutes: Number(state.settings.interval_minutes),
        theme_id: state.settings.theme_id,
        font_size: state.settings.font_size,
        common_items: getCommonItems(),
        updated_at: new Date().toISOString()
      };
      if (includeViewMode) payload.view_mode = state.settings.view_mode;
      return payload;
    }

    function handleCalendarClick(event) {
      const dayHead = event.target.closest(".day-head");
      if (dayHead) {
        openDayMenu(dayHead.dataset.date, dayHead);
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (actionButton) {
        const actions = actionButton.closest(".todo-actions");
        const todo = findTodo(actions?.dataset.activeTodoId);
        if (!todo) return;
        const action = actionButton.dataset.action;
        if (action === "toggle") toggleTodo(todo);
        if (action === "delete") deleteTodo(todo);
        if (action === "add-near") showAddInput(todo.todo_date, trimTime(todo.slot_start));
        return;
      }

      const todoEl = event.target.closest(".todo-item");
      if (todoEl) {
        openSlotActions(todoEl.closest(".slot-cell"), todoEl.dataset.todoId);
        return;
      }

      if (event.target.closest(".todo-actions")) {
        return;
      }

      if (event.target.closest(".add-row")) {
        return;
      }

      const slot = event.target.closest(".slot-cell");
      if (slot) {
        closeTodoActions();
        showAddInput(slot.dataset.date, slot.dataset.time);
      }
    }

    function handleCalendarInput(event) {
      const textEl = event.target.closest(".todo-text");
      if (!textEl) return;
      const todoEl = textEl.closest(".todo-item");
      const todo = findTodo(todoEl?.dataset.todoId);
      if (!todo) return;
      todo.content = textEl.textContent.trim();
      scheduleTodoTextSave(todo);
    }

    function handleCalendarChange(event) {
      const commonSelect = event.target.closest('[data-action="common"]');
      if (!commonSelect || !commonSelect.value) return;
      const actions = commonSelect.closest(".todo-actions");
      const todo = findTodo(actions?.dataset.activeTodoId);
      if (!todo) return;
      updateTodo(todo, { content: commonSelect.value });
    }

    function openSlotActions(slot, todoId) {
      if (!slot || !todoId) return;
      const wasOpen = slot.classList.contains("is-open") && slot.querySelector(".todo-actions")?.dataset.activeTodoId === String(todoId);
      closeTodoActions();
      if (wasOpen) return;
      const actions = slot.querySelector(".todo-actions");
      const todo = findTodo(todoId);
      if (actions && todo) {
        actions.dataset.activeTodoId = todoId;
        actions.querySelector('[data-action="toggle"]').textContent = todo.is_done ? "未完成" : "已完成";
      }
      slot.classList.add("is-open");
    }

    function closeTodoActions() {
      els.calendarFrame.querySelectorAll(".slot-cell.is-open").forEach((item) => item.classList.remove("is-open"));
    }

    function handleCalendarKeydown(event) {
      const addInput = event.target.closest(".add-input");
      if (addInput) {
        if (event.key === "Enter") {
          event.preventDefault();
          submitAddInput(addInput);
        }
        if (event.key === "Escape") {
          event.preventDefault();
          renderCalendar();
        }
        return;
      }

      const textEl = event.target.closest(".todo-text");
      if (textEl && event.key === "Enter") {
        event.preventDefault();
        textEl.blur();
      }
    }

    function showAddInput(date, time) {
      renderCalendar();
      const slot = els.calendarFrame.querySelector(`.slot-cell[data-date="${date}"][data-time="${time}"]`);
      if (!slot) return;
      const row = document.createElement("div");
      row.className = "add-row";
      row.innerHTML = `
        <input class="add-input" data-date="${date}" data-time="${time}" placeholder="輸入其他文字">
        <div class="add-controls">
          <select class="add-common-select" aria-label="常用項目">
            <option value="">選常用</option>
            ${renderCommonOptions()}
          </select>
          <button class="mini-button primary-button" type="button" data-add-submit>✓</button>
          <button class="mini-button" type="button" data-add-cancel>×</button>
        </div>
      `;
      slot.appendChild(row);
      row.querySelector("[data-add-submit]").addEventListener("click", () => submitAddInput(row.querySelector(".add-input")));
      row.querySelector("[data-add-cancel]").addEventListener("click", renderCalendar);
      row.querySelector(".add-common-select").addEventListener("change", (event) => {
        row.querySelector(".add-input").value = event.target.value;
        row.querySelector(".add-input").focus();
      });
      row.querySelector(".add-input").focus();
    }

    async function submitAddInput(input) {
      const content = input.value.trim();
      if (!content) {
        renderCalendar();
        return;
      }
      await addTodo(input.dataset.date, input.dataset.time, content);
    }

    async function addTodo(date, time, content) {
      if (!requireCloudClient()) return;
      const sortOrder = getTodosForCell(date, time).length;
      const todo = normalizeTodo({
        id: `local-${crypto.randomUUID()}`,
        instance_id: state.instanceId,
        todo_date: date,
        slot_start: time,
        content,
        is_done: false,
        color_tag: "default",
        sort_order: sortOrder,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      });

      setSyncStatus("saving", "雲端儲存中…");
      try {
        const payload = toSupabasePayload(todo, false);
        const { data, error } = await state.supabase.from("todos").insert(payload).select().single();
        if (error) throw error;
        state.todos.push(normalizeTodo(data));
        renderCalendar();
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        queueRetry(() => addTodo(date, time, content));
        setSyncStatus("error", "無法同步，將自動重試");
        console.warn(error);
      }
    }

    async function updateTodo(todo, patch, options = {}) {
      Object.assign(todo, patch, { updated_at: new Date().toISOString() });
      if (!options.skipRender) renderCalendar();

      if (!requireCloudClient() || isLocalId(todo.id)) {
        return;
      }

      setSyncStatus("saving", "雲端儲存中…");
      try {
        const { error } = await state.supabase
          .from("todos")
          .update({ ...patch, updated_at: todo.updated_at })
          .eq("id", todo.id)
          .eq("instance_id", state.instanceId);
        if (error) throw error;
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        queueRetry(() => updateTodo(todo, patch, options));
        setSyncStatus("error", "無法同步，將自動重試");
        console.warn(error);
      }
    }

    function scheduleTodoTextSave(todo) {
      const patch = { content: todo.content || "未命名" };
      window.clearTimeout(state.dirtyTimers.get(todo.id));
      state.dirtyTimers.set(todo.id, window.setTimeout(() => {
        state.dirtyTimers.delete(todo.id);
        window.clearTimeout(state.dirtyMaxTimers.get(todo.id));
        state.dirtyMaxTimers.delete(todo.id);
        updateTodo(todo, patch, { skipRender: true });
      }, 800));

      if (!state.dirtyMaxTimers.has(todo.id)) {
        state.dirtyMaxTimers.set(todo.id, window.setTimeout(() => {
          window.clearTimeout(state.dirtyTimers.get(todo.id));
          state.dirtyTimers.delete(todo.id);
          state.dirtyMaxTimers.delete(todo.id);
          updateTodo(todo, patch, { skipRender: true });
        }, 5000));
      }
      setSyncStatus(state.supabase ? "saving" : "error", state.supabase ? "雲端儲存中…" : "雲端未連線");
    }

    async function toggleTodo(todo) {
      await updateTodo(todo, { is_done: !todo.is_done });
    }

    async function toggleTag(todo) {
      await updateTodo(todo, { color_tag: todo.color_tag === "important" ? "default" : "important" });
    }

    async function deleteTodo(todo) {
      if (!requireCloudClient() || isLocalId(todo.id)) {
        return;
      }

      state.todos = state.todos.filter((item) => String(item.id) !== String(todo.id));
      renderCalendar();

      setSyncStatus("saving", "雲端儲存中…");
      try {
        const { error } = await state.supabase
          .from("todos")
          .delete()
          .eq("id", todo.id)
          .eq("instance_id", state.instanceId);
        if (error) throw error;
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        queueRetry(() => deleteTodo(todo));
        setSyncStatus("error", "無法同步，將自動重試");
        console.warn(error);
      }
    }

    function handleDragStart(event) {
      const todoEl = event.target.closest(".todo-item");
      if (!todoEl) return;
      state.draggedTodoId = todoEl.dataset.todoId;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", state.draggedTodoId);
    }

    function handleDragOver(event) {
      const slot = event.target.closest(".slot-cell");
      const todoEl = event.target.closest(".todo-item");
      if (!slot && !todoEl) return;
      event.preventDefault();
      if (todoEl && todoEl.dataset.todoId !== state.draggedTodoId) {
        todoEl.classList.add("is-drag-over");
      } else if (slot) {
        slot.classList.add("is-drop-target");
      }
    }

    function handleDragLeave(event) {
      const target = event.target.closest(".slot-cell, .todo-item");
      if (target) {
        target.classList.remove("is-drop-target", "is-drag-over");
      }
    }

    async function handleDrop(event) {
      const draggedId = state.draggedTodoId || event.dataTransfer.getData("text/plain");
      const draggedTodo = findTodo(draggedId);
      if (!draggedTodo) return;
      event.preventDefault();

      const targetTodoEl = event.target.closest(".todo-item");
      const targetSlot = event.target.closest(".slot-cell");
      clearDragStyles();

      if (targetTodoEl && targetTodoEl.dataset.todoId !== draggedId) {
        const targetTodo = findTodo(targetTodoEl.dataset.todoId);
        if (targetTodo) {
          await moveTodoBefore(draggedTodo, targetTodo);
          return;
        }
      }

      if (targetSlot) {
        await moveTodoToSlot(draggedTodo, targetSlot.dataset.date, targetSlot.dataset.time);
      }
    }

    function clearDragStyles() {
      state.draggedTodoId = null;
      els.calendarFrame.querySelectorAll(".is-drop-target, .is-drag-over").forEach((el) => {
        el.classList.remove("is-drop-target", "is-drag-over");
      });
    }

    async function moveTodoToSlot(todo, date, time) {
      const nextOrder = getTodosForCell(date, time).filter((item) => String(item.id) !== String(todo.id)).length;
      await updateTodo(todo, { todo_date: date, slot_start: time, sort_order: nextOrder });
      await normalizeCellOrders(date, time);
    }

    async function moveTodoBefore(todo, targetTodo) {
      todo.todo_date = targetTodo.todo_date;
      todo.slot_start = targetTodo.slot_start;
      const cellTodos = getTodosForCell(targetTodo.todo_date, targetTodo.slot_start).filter((item) => String(item.id) !== String(todo.id));
      const targetIndex = cellTodos.findIndex((item) => String(item.id) === String(targetTodo.id));
      cellTodos.splice(Math.max(targetIndex, 0), 0, todo);
      await persistOrder(cellTodos);
    }

    async function normalizeCellOrders(date, time) {
      await persistOrder(getTodosForCell(date, time));
    }

    async function persistOrder(cellTodos) {
      const updates = cellTodos.map((todo, index) => {
        todo.sort_order = index;
        todo.updated_at = new Date().toISOString();
        return todo;
      });
      renderCalendar();

      if (!requireCloudClient()) {
        return;
      }

      setSyncStatus("saving", "雲端儲存中…");
      try {
        const cloudUpdates = updates
          .filter((todo) => !isLocalId(todo.id))
          .map((todo) => state.supabase
            .from("todos")
            .update({
              todo_date: todo.todo_date,
              slot_start: todo.slot_start,
              sort_order: todo.sort_order,
              updated_at: todo.updated_at
            })
            .eq("id", todo.id)
            .eq("instance_id", state.instanceId));
        const results = await Promise.all(cloudUpdates);
        const failed = results.find((result) => result.error);
        if (failed) throw failed.error;
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        queueRetry(() => persistOrder(cellTodos));
        setSyncStatus("error", "無法同步，將自動重試");
        console.warn(error);
      }
    }

    function openDayMenu(date, anchor, openCopy = false) {
      state.selectedDay = date;
      els.dayMenuTitle.textContent = `${formatFullDate(date)}（${weekdayName(date)}）`;
      els.copyTargetBox.classList.toggle("is-open", openCopy);
      els.copyTargetInput.value = addDaysKey(date, 1);
      els.scrim.hidden = false;
      els.dayMenu.hidden = false;

      const rect = anchor.getBoundingClientRect();
      const width = Math.min(360, window.innerWidth - 24);
      const left = Math.min(Math.max(12, rect.left), window.innerWidth - width - 12);
      const top = Math.min(rect.bottom + 8, window.innerHeight - 260);
      els.dayMenu.style.left = `${left}px`;
      els.dayMenu.style.top = `${Math.max(12, top)}px`;

      if (openCopy) els.copyTargetInput.focus();
    }

    function closeDayMenu() {
      els.dayMenu.hidden = true;
      els.scrim.hidden = true;
      els.copyTargetBox.classList.remove("is-open");
    }

    async function clearSelectedDay() {
      const date = state.selectedDay;
      if (!date) return;
      if (!confirm(`確定清除 ${formatShortDate(date)} 全部行程？`)) return;
      if (!requireCloudClient()) return;
      const deleted = state.todos.filter((todo) => todo.todo_date === date);
      state.todos = state.todos.filter((todo) => todo.todo_date !== date);
      closeDayMenu();
      renderCalendar();

      setSyncStatus("saving", "雲端儲存中…");
      try {
        const { error } = await state.supabase
          .from("todos")
          .delete()
          .eq("instance_id", state.instanceId)
          .eq("todo_date", date);
        if (error) throw error;
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        state.todos.push(...deleted);
        renderCalendar();
        queueRetry(() => clearSelectedDay());
        setSyncStatus("error", "無法同步，將自動重試");
        console.warn(error);
      }
    }

    async function copySelectedDay() {
      const sourceDate = state.selectedDay;
      const targetDate = els.copyTargetInput.value;
      if (!sourceDate || !targetDate) return;
      if (sourceDate === targetDate) {
        showToast("目標日期不可與來源日期相同。");
        return;
      }

      const sourceTodos = getTodosForDay(sourceDate).slice(0, 100);
      if (!sourceTodos.length) {
        showToast("該日沒有可複製的事項。");
        return;
      }
      if (!requireCloudClient()) return;

      const copies = sourceTodos.map((todo, index) => normalizeTodo({
        id: `local-${crypto.randomUUID()}`,
        instance_id: state.instanceId,
        todo_date: targetDate,
        slot_start: todo.slot_start,
        content: todo.content,
        is_done: false,
        color_tag: todo.color_tag,
        sort_order: getTodosForCell(targetDate, todo.slot_start).length + index,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }));

      setSyncStatus("saving", "雲端儲存中…");
      try {
        const payload = copies.map((todo) => toSupabasePayload(todo, false));
        const { data, error } = await state.supabase.from("todos").insert(payload).select();
        if (error) throw error;
        state.todos.push(...(data || []).map(normalizeTodo));
        closeDayMenu();
        renderCalendar();
        setSyncStatus("saved", "同步雲端");
      } catch (error) {
        queueRetry(() => copySelectedDay());
        setSyncStatus("error", "無法同步，將自動重試");
        console.warn(error);
      }
    }

    function scheduleCurrentSlotUpdate() {
      window.clearTimeout(state.currentTimer);
      const now = new Date();
      const msToNextMinute = 60000 - (now.getSeconds() * 1000 + now.getMilliseconds());
      state.currentTimer = window.setTimeout(() => {
        renderCalendar();
        scheduleCurrentSlotUpdate();
      }, msToNextMinute + 50);
    }

    function queueRetry(task) {
      state.retryQueue.push(task);
      if (state.retryTimer) return;
      state.retryTimer = window.setTimeout(runRetryQueue, 5000);
    }

    async function runRetryQueue() {
      state.retryTimer = null;
      if (!state.retryQueue.length) return;
      const tasks = state.retryQueue.splice(0, state.retryQueue.length);
      for (const task of tasks) {
        try {
          await task();
        } catch (error) {
          console.warn(error);
        }
      }
    }

    function requireCloudClient() {
      if (state.supabase) return true;
      setSyncStatus("error", "雲端未連線");
      showToast("目前無法連線 Supabase，資料不會存到本機暫存。");
      return false;
    }

    function reportSupabaseError(error, fallbackMessage) {
      const message = error?.message || fallbackMessage;
      setSyncStatus("error", fallbackMessage);
      showToast(`${fallbackMessage}：${message}`);
      console.warn(error);
    }

    function isPermanentSupabaseError(error) {
      const code = String(error?.code || "");
      const message = String(error?.message || "").toLowerCase();
      return code === "PGRST204" ||
        code === "42703" ||
        code === "42501" ||
        message.includes("could not find") ||
        message.includes("permission denied") ||
        message.includes("row-level security") ||
        message.includes("anon update policy") ||
        message.includes("設定未寫入");
    }

    function isMissingViewModeColumnError(error) {
      const code = String(error?.code || "");
      const message = String(error?.message || "").toLowerCase();
      return (code === "PGRST204" || code === "42703" || message.includes("could not find") || message.includes("does not exist")) &&
        message.includes("view_mode");
    }

    function setSyncStatus(stateName, text) {
      els.syncStatus.dataset.state = stateName;
      els.syncText.textContent = text;
      document.querySelectorAll("[data-mobile-sync-status]").forEach((item) => {
        item.dataset.state = stateName;
      });
      document.querySelectorAll("[data-mobile-sync-text]").forEach((item) => {
        item.textContent = text;
      });
    }

    function setJumpDateInputs(value) {
      els.jumpDateInput.value = value;
      els.mobileJumpDateInput.value = value;
    }

    function isMobileLayout() {
      return window.matchMedia("(max-width: 767px)").matches;
    }

    function showToast(message) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = message;
      els.toastStack.appendChild(toast);
      window.setTimeout(() => toast.remove(), 3600);
    }

    function getTodosForCell(date, time) {
      return state.todos
        .filter((todo) => todo.todo_date === date && trimTime(todo.slot_start) === time)
        .sort((a, b) => Number(a.sort_order) - Number(b.sort_order));
    }

    function getTodosForDay(date) {
      return state.todos
        .filter((todo) => todo.todo_date === date)
        .sort((a, b) => {
          if (a.slot_start === b.slot_start) return Number(a.sort_order) - Number(b.sort_order);
          return a.slot_start.localeCompare(b.slot_start);
        });
    }

    function findTodo(id) {
      return state.todos.find((todo) => String(todo.id) === String(id));
    }

    function replaceTodo(oldId, nextTodo) {
      const index = state.todos.findIndex((todo) => String(todo.id) === String(oldId));
      if (index >= 0) state.todos.splice(index, 1, nextTodo);
    }

    function normalizeTodo(todo) {
      return {
        id: todo.id,
        instance_id: todo.instance_id || state.instanceId,
        todo_date: todo.todo_date,
        slot_start: trimTime(todo.slot_start),
        content: String(todo.content || "未命名"),
        is_done: Boolean(todo.is_done),
        color_tag: todo.color_tag === "important" ? "important" : "default",
        sort_order: Number(todo.sort_order || 0),
        created_at: todo.created_at || new Date().toISOString(),
        updated_at: todo.updated_at || new Date().toISOString()
      };
    }

    function toSupabasePayload(todo, includeId = true) {
      const payload = {
        instance_id: state.instanceId,
        todo_date: todo.todo_date,
        slot_start: trimTime(todo.slot_start),
        content: todo.content || "未命名",
        is_done: Boolean(todo.is_done),
        color_tag: todo.color_tag || "default",
        sort_order: Number(todo.sort_order || 0),
        updated_at: new Date().toISOString()
      };
      if (includeId && !isLocalId(todo.id)) payload.id = todo.id;
      return payload;
    }

    function normalizeSettings(settings) {
      const interval = [10, 15, 30, 60].includes(Number(settings.interval_minutes))
        ? Number(settings.interval_minutes)
        : DEFAULT_SETTINGS.interval_minutes;
      const dayStart = isTime(settings.day_start) ? trimTime(settings.day_start) : DEFAULT_SETTINGS.day_start;
      const dayEnd = isTime(settings.day_end) ? trimTime(settings.day_end) : DEFAULT_SETTINGS.day_end;
      return {
        day_start: dayStart,
        day_end: timeToMinutes(dayEnd) > timeToMinutes(dayStart) ? dayEnd : DEFAULT_SETTINGS.day_end,
        interval_minutes: interval,
        theme_id: isValidTheme(settings.theme_id) ? settings.theme_id : DEFAULT_SETTINGS.theme_id,
        font_size: isValidFontSize(settings.font_size) ? settings.font_size : DEFAULT_SETTINGS.font_size,
        view_mode: isValidViewMode(settings.view_mode) ? settings.view_mode : DEFAULT_SETTINGS.view_mode,
        common_items: normalizeCommonItems(settings.common_items)
      };
    }

    function isValidFontSize(size) {
      return ["small", "medium", "large", "xlarge"].includes(size);
    }

    function isValidViewMode(viewMode) {
      return ["today", "week"].includes(viewMode);
    }

    function settingsPayloadMatches(savedSettings, payload, includeViewMode = true) {
      const saved = normalizeSettings(savedSettings);
      const expected = normalizeSettings(payload);
      const viewModeMatches = !includeViewMode || saved.view_mode === expected.view_mode;
      return viewModeMatches &&
        saved.day_start === expected.day_start &&
        saved.day_end === expected.day_end &&
        saved.interval_minutes === expected.interval_minutes &&
        saved.theme_id === expected.theme_id &&
        saved.font_size === expected.font_size &&
        JSON.stringify(saved.common_items) === JSON.stringify(expected.common_items);
    }

    function applyFontSize(size) {
      const values = {
        small: "13px",
        medium: "15px",
        large: "17px",
        xlarge: "19px"
      };
      document.documentElement.style.setProperty("--todo-font-size", values[isValidFontSize(size) ? size : "medium"]);
    }

    function normalizeCommonItems(items) {
      if (!Array.isArray(items)) return [];
      return [...new Set(items.map((item) => String(item || "").trim()).filter(Boolean))];
    }

    function getCommonItems() {
      return normalizeCommonItems(state.settings.common_items);
    }

    function getVisibleDays() {
      if (state.settings.view_mode === "today") return [todayKey()];
      return Array.from({ length: 7 }, (_, index) => addDaysKey(state.weekStart, index));
    }

    function generateSlots() {
      const slots = [];
      const start = timeToMinutes(state.settings.day_start);
      const end = timeToMinutes(state.settings.day_end);
      const interval = Number(state.settings.interval_minutes);
      if (!Number.isFinite(start) || !Number.isFinite(end) || start >= end) return slots;
      for (let minute = start; minute < end; minute += interval) {
        slots.push(minutesToTime(minute));
      }
      return slots;
    }

    function getCurrentSlotKey() {
      const now = getTaipeiParts(new Date());
      const total = Number(now.hour) * 60 + Number(now.minute);
      const start = timeToMinutes(state.settings.day_start);
      const end = timeToMinutes(state.settings.day_end);
      const interval = Number(state.settings.interval_minutes);
      if (total < start || total >= end) return "";
      return minutesToTime(total - ((total - start) % interval));
    }

    function getInstanceId() {
      let id = localStorage.getItem("todo_instance_id");
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("todo_instance_id", id);
      }
      return id;
    }

    function applyTheme(themeId) {
      const safeTheme = isValidTheme(themeId) ? themeId : DEFAULT_SETTINGS.theme_id;
      els.body.dataset.theme = safeTheme;
    }

    function isValidTheme(themeId) {
      return THEMES.some((theme) => theme.id === themeId);
    }

    function todayKey() {
      const parts = getTaipeiParts(new Date());
      return `${parts.year}-${parts.month}-${parts.day}`;
    }

    function getTaipeiParts(date) {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23"
      });
      return formatter.formatToParts(date).reduce((acc, part) => {
        if (part.type !== "literal") acc[part.type] = part.value;
        return acc;
      }, {});
    }

    function dateFromKey(dateKeyValue) {
      const [year, month, day] = dateKeyValue.split("-").map(Number);
      return new Date(Date.UTC(year, month - 1, day));
    }

    function dateToKey(date) {
      const year = date.getUTCFullYear();
      const month = String(date.getUTCMonth() + 1).padStart(2, "0");
      const day = String(date.getUTCDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDaysKey(dateKeyValue, days) {
      const date = dateFromKey(dateKeyValue);
      date.setUTCDate(date.getUTCDate() + days);
      return dateToKey(date);
    }

    function getMonday(dateKeyValue) {
      const date = dateFromKey(dateKeyValue);
      const day = date.getUTCDay();
      const offset = day === 0 ? -6 : 1 - day;
      date.setUTCDate(date.getUTCDate() + offset);
      return dateToKey(date);
    }

    function weekdayName(dateKeyValue) {
      return WEEKDAYS[dateFromKey(dateKeyValue).getUTCDay()];
    }

    function formatFullDate(dateKeyValue) {
      const [year, month, day] = dateKeyValue.split("-");
      return `${year}/${month}/${day}`;
    }

    function formatMonthDay(dateKeyValue) {
      const [, month, day] = dateKeyValue.split("-");
      return `${month}/${day}`;
    }

    function formatColumnDate(dateKeyValue) {
      const [, month, day] = dateKeyValue.split("-");
      return `${month}/${day}(${weekdayName(dateKeyValue)})`;
    }

    function formatShortDate(dateKeyValue) {
      const [, month, day] = dateKeyValue.split("-");
      return `${Number(month)}/${Number(day)}`;
    }

    function isTime(value) {
      return /^\d{2}:\d{2}(:\d{2})?$/.test(String(value || ""));
    }

    function trimTime(value) {
      return String(value || "").slice(0, 5);
    }

    function timeToMinutes(value) {
      const [hour, minute] = trimTime(value).split(":").map(Number);
      return hour * 60 + minute;
    }

    function minutesToTime(total) {
      const hour = Math.floor(total / 60);
      const minute = total % 60;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function isLocalId(id) {
      return String(id).startsWith("local-");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
